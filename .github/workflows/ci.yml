name: CI

on:
  pull_request:
    paths-ignore:
      - README.md

permissions:
  contents: read

jobs:
  docker-bake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test with Docker Bake
        uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
